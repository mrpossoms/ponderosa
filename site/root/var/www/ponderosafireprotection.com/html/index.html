<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ponderosa Fire Protection — Coming Soon</title>
<meta name="description" content="Colorado's eco-safe wildfire defense system. Coming soon." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(900px 600px at 65% 100%, rgba(255,69,0,.13), transparent 55%),
    radial-gradient(700px 500px at 20% 0%, rgba(241,138,31,.10), transparent 55%),
    linear-gradient(180deg,#0A0A0A 0%, #120E0B 100%);
  position:relative;
  overflow:hidden;
}
.center{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:40px 32px;
}
.logo-shield-lg{
  width:clamp(96px,14vw,140px);
  height:auto;
  margin-bottom:36px;
  filter:drop-shadow(0 0 32px rgba(241,138,31,.35));
}
.brand-name{
  font-family:'Bebas Neue',Impact,sans-serif;
  font-size:clamp(60px,11vw,128px);
  line-height:.9;
  letter-spacing:.01em;
}
.brand-sub{
  font-family:'Oswald',sans-serif;
  font-size:clamp(13px,2.5vw,20px);
  letter-spacing:.38em;
  text-transform:uppercase;
  color:var(--orange);
  font-weight:600;
  margin-top:12px;
}
.coming-tag{
  margin-top:52px;
  font-family:'Oswald',sans-serif;
  font-size:12px;
  letter-spacing:.30em;
  text-transform:uppercase;
  color:rgba(255,246,232,.45);
  border:1px solid var(--line-strong);
  padding:11px 28px;
  border-radius:2px;
}
</style>
</head>
<body>

<div class="embers" aria-hidden="true">
  <span class="ember-dot" style="left:10%;top:88%;animation-delay:0s"></span>
  <span class="ember-dot" style="left:26%;top:92%;animation-delay:1.8s;width:2px;height:2px"></span>
  <span class="ember-dot" style="left:48%;top:86%;animation-delay:.9s"></span>
  <span class="ember-dot" style="left:66%;top:90%;animation-delay:2.5s;width:4px;height:4px"></span>
  <span class="ember-dot" style="left:82%;top:84%;animation-delay:1.3s"></span>
  <span class="ember-dot" style="left:92%;top:91%;animation-delay:3.4s;width:2px;height:2px"></span>
</div>

<main class="page">
  <div class="center">
    <svg class="logo-shield-lg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg" aria-label="Ponderosa Fire Protection">
      <path d="M50 4 C 30 8, 14 12, 8 18 L 8 60 C 8 84, 28 100, 50 106 C 72 100, 92 84, 92 60 L 92 18 C 86 12, 70 8, 50 4 Z"
            fill="#F18A1F" stroke="#0A0A0A" stroke-width="5" stroke-linejoin="round"/>
      <g fill="#0A0A0A">
        <polygon points="50,18 42,30 47,30 38,42 46,42 34,56 44,56 30,72 70,72 56,56 66,56 54,42 62,42 53,30 58,30"/>
        <rect x="47" y="72" width="6" height="22" rx="1"/>
      </g>
    </svg>
    <div class="brand-name">Ponderosa</div>
    <div class="brand-sub">Fire Protection</div>
    <div class="coming-tag">Coming Soon</div>
  </div>
</main>

</body>
</html>
